name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # ── Cache the heavy binaries so re-runs are fast ─────────────────────
      - name: Cache binaries (whisper, model, ffmpeg)
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: bin
          key: binaries-vulkan-v1-large-v3-turbo

      - name: Install Vulkan SDK
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Installing Vulkan SDK..."
          # Use the official LunarG SDK installer (silent install)
          $sdkUrl = 'https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe'
          Invoke-WebRequest -Uri $sdkUrl -OutFile vulkan-sdk.exe -UseBasicParsing
          Start-Process -FilePath .\vulkan-sdk.exe -ArgumentList '--accept-licenses','--default-answer','--confirm-command','install' -Wait
          # Find the install dir and expose VULKAN_SDK for CMake
          $vkRoot = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vkRoot) { throw "Vulkan SDK install dir not found under C:\VulkanSDK" }
          Write-Host "VULKAN_SDK = $($vkRoot.FullName)"
          "VULKAN_SDK=$($vkRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Remove-Item vulkan-sdk.exe -Force

      - name: Build whisper.cpp with Vulkan
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Write-Host "Cloning whisper.cpp v1.8.4..."
          git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git whisper-src
          Push-Location whisper-src
          Write-Host "Configuring with Vulkan..."
          cmake -B build -DGGML_VULKAN=ON -DCMAKE_BUILD_TYPE=Release -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          Write-Host "Building (Release)..."
          # Build everything (don't target a single name — it varies by version).
          # MSBuild parallelism is passed via -- /m rather than -j.
          cmake --build build --config Release -- /m
          Pop-Location
          # whisper.cpp ships DEPRECATION STUBS: tiny exes that print a warning and exit 1.
          # The stub and the real binary can share a name (whisper-cli.exe) in different
          # subdirs, or the stub may be named whisper-cli.exe while the real one is
          # whisper-whisper-cli.exe (double-prefix bug, issue #3023). The ONLY reliable
          # discriminator is size: stubs are tiny (<200KB), the real CLI is several MB.
          $allCli = Get-ChildItem -Path whisper-src/build -Recurse -File |
                    Where-Object { $_.Name -in @('whisper-cli.exe','whisper-whisper-cli.exe','main.exe','whisper-main.exe') }
          Write-Host "Candidate CLI binaries found:"
          $allCli | Select-Object FullName, @{N='KB';E={[math]::Round($_.Length/1KB)}} | Format-Table -AutoSize
          # Pick the largest one that exceeds the stub threshold.
          $exe = $allCli | Where-Object { $_.Length -gt 200000 } | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw "Build did not produce a real whisper CLI executable (only stubs found)" }
          Write-Host "Selected: $($exe.FullName) ($([math]::Round($exe.Length/1KB))KB)"
          # Copy exe (normalize name to whisper-cli.exe) + every produced DLL into bin/
          Copy-Item $exe.FullName -Destination 'bin/whisper-cli.exe' -Force
          Get-ChildItem -Path whisper-src/build -Recurse -Include '*.dll' -File | ForEach-Object {
            Copy-Item $_.FullName -Destination bin -Force
          }
          Remove-Item whisper-src -Recurse -Force
          Write-Host "whisper.cpp (Vulkan) built and installed:"
          Get-ChildItem bin | Select-Object Name, Length | Format-Table

      - name: Download Whisper large-v3-turbo model
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin'
          $dest = 'bin/ggml-large-v3-turbo.bin'
          Write-Host "Downloading Whisper large-v3-turbo model (~1.6GB)..."
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              # Use BITS-free direct download with a generous timeout
              Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing -TimeoutSec 1800
              $sizeMB = (Get-Item $dest).Length / 1MB
              if ($sizeMB -lt 1000) {
                throw "Downloaded file too small ($([math]::Round($sizeMB))MB) — likely incomplete."
              }
              Write-Host "Model downloaded: $([math]::Round($sizeMB)) MB"
              break
            } catch {
              Write-Host "Attempt $i failed: $($_.Exception.Message)"
              if (Test-Path $dest) { Remove-Item $dest -Force }
              if ($i -eq $maxAttempts) { throw "Model download failed after $maxAttempts attempts." }
              Start-Sleep -Seconds 10
            }
          }

      - name: Download FFmpeg
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip'
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp -Force
          $ffBin = Get-ChildItem -Path ffmpeg-tmp -Recurse -Directory -Filter 'bin' | Select-Object -First 1
          Copy-Item "$($ffBin.FullName)\ffmpeg.exe" -Destination bin -Force
          Copy-Item "$($ffBin.FullName)\ffprobe.exe" -Destination bin -Force
          Remove-Item ffmpeg.zip, ffmpeg-tmp -Recurse -Force
          Write-Host "ffmpeg installed"
          Get-ChildItem bin | Select-Object Name, Length | Format-Table

      - name: Verify all binaries present
        shell: pwsh
        run: |
          $required = @('whisper-cli.exe', 'ggml-large-v3-turbo.bin', 'ffmpeg.exe', 'ffprobe.exe')
          foreach ($f in $required) {
            if (-not (Test-Path "bin/$f")) {
              Write-Error "MISSING: bin/$f"
              exit 1
            }
            Write-Host "✓ bin/$f"
          }
          # List the ggml/Vulkan DLLs that were built alongside the exe
          $dlls = Get-ChildItem bin -Filter '*.dll'
          Write-Host "DLLs shipped in bin/:"
          $dlls | Select-Object Name | Format-Table
          # SMOKE TEST: run whisper-cli -h and confirm it's the REAL binary, not a
          # deprecation stub. The stub prints "is deprecated" and exits non-zero;
          # the real binary prints usage text. Fail the build if we shipped a stub.
          Push-Location bin
          $out = & .\whisper-cli.exe -h 2>&1 | Out-String
          $code = $LASTEXITCODE
          Pop-Location
          Write-Host "whisper-cli -h output (first 300 chars):"
          Write-Host $out.Substring(0, [Math]::Min(300, $out.Length))
          if ($out -match 'is deprecated') {
            Write-Error "whisper-cli.exe is a DEPRECATION STUB, not the real binary. Build selected the wrong exe."
            exit 1
          }
          if ($out -notmatch 'usage:|--threads|--model') {
            Write-Error "whisper-cli.exe did not print expected usage text (exit $code). Possibly broken or missing DLLs."
            exit 1
          }
          Write-Host "✓ whisper-cli.exe is the real binary and runs."

      - name: Install npm dependencies
        working-directory: app
        run: npm install --no-audit --no-fund --loglevel=error

      - name: Build installer
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptionHighlighter-Setup
          path: |
            app/dist/*.exe
            app/dist/latest.yml
            app/dist/*.blockmap

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.exe
            app/dist/latest.yml
            app/dist/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
