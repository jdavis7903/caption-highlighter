name: Build Windows Installer

# Trigger: manually from the Actions tab, OR automatically when you push code
on:
  workflow_dispatch:    # adds a "Run workflow" button in GitHub
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Cache the downloaded binaries so subsequent builds skip the 1.5GB model download
      - name: Cache binaries (whisper, model, ffmpeg)
        id: cache-bin
        uses: actions/cache@v4
        with:
          path: bin
          key: bin-whisper-cuda-medium-en-ffmpeg-essentials-v3

      - name: Download whisper.cpp (CUDA cuBLAS build)
        if: steps.cache-bin.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          New-Item -ItemType Directory -Force -Path downloads | Out-Null

          Write-Host "Finding latest cuBLAS whisper.cpp release..."
          # The cuBLAS asset name includes a CUDA version (e.g. whisper-cublas-12.2.0-bin-x64.zip)
          # We query the GitHub API to find the latest one.
          $headers = @{ 'User-Agent' = 'CaptionHighlighter-Build' }
          $rel = Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/ggerganov/whisper.cpp/releases/latest'
          $cublas = $rel.assets | Where-Object { $_.name -match '^whisper-cublas-.*-bin-x64\.zip$' } | Select-Object -First 1
          if (-not $cublas) {
            throw "No cuBLAS asset found in latest release. Check release page manually."
          }
          Write-Host "Downloading $($cublas.name) ($([math]::Round($cublas.size / 1MB, 1)) MB)..."

          curl.exe -L --retry 5 --retry-delay 5 -o 'downloads/whisper.zip' $cublas.browser_download_url
          if ($LASTEXITCODE -ne 0) { throw "curl failed with exit $LASTEXITCODE" }

          Expand-Archive -Force -Path 'downloads/whisper.zip' -DestinationPath 'downloads/whisper'

          # Find the exe wherever it landed
          $exe = Get-ChildItem -Recurse downloads/whisper -Filter "whisper-cli.exe" | Select-Object -First 1
          if (-not $exe) { $exe = Get-ChildItem -Recurse downloads/whisper -Filter "main.exe" | Select-Object -First 1 }
          if (-not $exe) { throw "Could not find whisper exe in downloaded zip" }
          Copy-Item $exe.FullName bin/

          # Copy ALL DLLs (CUDA runtime, ggml, whisper, etc) — required for cuBLAS build
          Get-ChildItem $exe.Directory -Filter "*.dll" | ForEach-Object { Copy-Item $_.FullName bin/ }

          $dllCount = (Get-ChildItem bin -Filter "*.dll").Count
          Write-Host "✓ whisper (CUDA) installed with $dllCount DLLs"

      - name: Download Whisper Medium English model
        if: steps.cache-bin.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading Whisper Medium English model (1.5 GB)..."
          # Use curl with explicit retry and continuation for large files
          # Windows runner has curl.exe baked in
          curl.exe -L --retry 5 --retry-delay 10 --retry-max-time 1800 `
            --connect-timeout 30 --max-time 1800 `
            -o 'bin/ggml-medium.en.bin' `
            'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.en.bin'
          if ($LASTEXITCODE -ne 0) { throw "curl failed with exit $LASTEXITCODE" }

          # Verify file size — model should be approximately 1.5 GB (1533 MB)
          $f = Get-Item 'bin/ggml-medium.en.bin'
          $sizeMB = [math]::Round($f.Length / 1MB, 1)
          Write-Host "Downloaded file size: $sizeMB MB"
          if ($f.Length -lt 1500MB) {
            throw "Model download incomplete: got $sizeMB MB, expected ~1533 MB. Aborting build."
          }
          Write-Host "✓ Model downloaded ($sizeMB MB)"

      - name: Download FFmpeg
        if: steps.cache-bin.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading FFmpeg..."
          Invoke-WebRequest -UseBasicParsing -Uri 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile 'downloads/ffmpeg.zip'
          Expand-Archive -Force -Path 'downloads/ffmpeg.zip' -DestinationPath 'downloads/ffmpeg'
          $dir = Get-ChildItem 'downloads/ffmpeg' -Directory | Where-Object { $_.Name -like 'ffmpeg-*-essentials*' } | Select-Object -First 1
          Copy-Item "$($dir.FullName)/bin/ffmpeg.exe" bin/
          Copy-Item "$($dir.FullName)/bin/ffprobe.exe" bin/
          Remove-Item -Recurse -Force downloads
          Write-Host "✓ FFmpeg installed"

      - name: Install npm dependencies
        working-directory: app
        run: npm install --no-audit --no-fund

      - name: Build installer
        working-directory: app
        run: npm run dist
        env:
          # electron-builder will skip code signing if these aren't set
          # which is fine for personal use
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Upload the installer as a downloadable artifact
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CaptionHighlighter-Installer
          path: dist/CaptionHighlighter-Setup-*.exe
          retention-days: 30

      # ── Also create a GitHub Release with the installer attached (only on tag pushes)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CaptionHighlighter-Setup-*.exe
          draft: false
          prerelease: false
