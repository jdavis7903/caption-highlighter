name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # ── Cache the heavy binaries so re-runs are fast ─────────────────────
      - name: Cache binaries (whisper, model, ffmpeg)
        id: cache-binaries
        uses: actions/cache@v4
        with:
          path: bin
          key: binaries-cuda-v3-medium-en

      - name: Download whisper.cpp (CUDA build)
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $url = 'https://github.com/ggml-org/whisper.cpp/releases/download/v1.8.4/whisper-cublas-12.4.0-bin-x64.zip'
          Write-Host "Downloading whisper CUDA build..."
          Invoke-WebRequest -Uri $url -OutFile whisper.zip -UseBasicParsing
          Expand-Archive -Path whisper.zip -DestinationPath whisper-tmp -Force
          # Copy ALL contents (exe + every CUDA DLL) into bin/
          Get-ChildItem -Path whisper-tmp -Recurse -File | ForEach-Object {
            Copy-Item $_.FullName -Destination bin -Force
          }
          Remove-Item whisper.zip, whisper-tmp -Recurse -Force
          # Ensure whisper-cli.exe exists. Older builds shipped main.exe; some ship whisper.exe.
          if (-not (Test-Path bin/whisper-cli.exe)) {
            if (Test-Path bin/main.exe) {
              Copy-Item bin/main.exe bin/whisper-cli.exe -Force
              Write-Host "Aliased main.exe -> whisper-cli.exe"
            } elseif (Test-Path bin/whisper.exe) {
              Copy-Item bin/whisper.exe bin/whisper-cli.exe -Force
              Write-Host "Aliased whisper.exe -> whisper-cli.exe"
            } else {
              Write-Host "WARNING: no recognizable whisper executable found in zip!"
            }
          }
          Write-Host "whisper.cpp + CUDA DLLs installed:"
          Get-ChildItem bin | Select-Object Name, Length | Format-Table

      - name: Download Whisper Medium English model
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.en.bin'
          Write-Host "Downloading Whisper Medium English model (~1.5GB)..."
          Invoke-WebRequest -Uri $url -OutFile bin/ggml-medium.en.bin -UseBasicParsing
          Write-Host "Model downloaded: $((Get-Item bin/ggml-medium.en.bin).Length / 1MB) MB"

      - name: Download FFmpeg
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip'
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp -Force
          $ffBin = Get-ChildItem -Path ffmpeg-tmp -Recurse -Directory -Filter 'bin' | Select-Object -First 1
          Copy-Item "$($ffBin.FullName)\ffmpeg.exe" -Destination bin -Force
          Copy-Item "$($ffBin.FullName)\ffprobe.exe" -Destination bin -Force
          Remove-Item ffmpeg.zip, ffmpeg-tmp -Recurse -Force
          Write-Host "ffmpeg installed"
          Get-ChildItem bin | Select-Object Name, Length | Format-Table

      - name: Verify all binaries present
        shell: pwsh
        run: |
          $required = @('whisper-cli.exe', 'ggml-medium.en.bin', 'ffmpeg.exe', 'ffprobe.exe')
          foreach ($f in $required) {
            if (-not (Test-Path "bin/$f")) {
              Write-Error "MISSING: bin/$f"
              exit 1
            }
            Write-Host "✓ bin/$f"
          }
          # Verify CUDA DLLs (warn if missing — won't fail build but app will fall back to CPU)
          $cudaDlls = Get-ChildItem bin -Filter '*.dll' | Where-Object { $_.Name -like '*cublas*' -or $_.Name -like '*cudart*' -or $_.Name -like '*ggml*' }
          Write-Host "CUDA / GGML DLLs found:"
          $cudaDlls | Select-Object Name | Format-Table

      - name: Install npm dependencies
        working-directory: app
        run: npm install --no-audit --no-fund --loglevel=error

      - name: Build installer
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptionHighlighter-Setup
          path: |
            app/dist/*.exe
            app/dist/latest.yml
            app/dist/*.blockmap

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.exe
            app/dist/latest.yml
            app/dist/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
